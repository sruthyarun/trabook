<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>

    <link rel="stylesheet" href="css/style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div id="signUpContainer" class=" container">

        <div class="form-container">

            <h2>Create Account</h2>

            <form id="signupForm">

                <!-- Full Name -->
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="fullname" placeholder="Enter your full name">
                    <small class="error" id="nameError"></small>
                </div>

                <!-- Email -->
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="example@mail.com">
                    <small class="error" id="emailError"></small>
                </div>

                <!-- Phone -->
                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="text" id="phone" placeholder="9876543210">
                    <small class="error" id="phoneError"></small>
                </div>

                <!-- Location -->
                <div class="input-group">
                    <label>Location / City</label>
                    <input type="text" id="city" placeholder="Enter your city">
                    <small class="error" id="cityError"></small>
                </div>

                <!-- Password -->
                <div class="input-group">
                    <label>Password</label>

                    <div class="password-box">
                        <input type="password" id="password" placeholder="Minimum 8 characters">

                        <i class="fa-solid fa-eye togglePassword" id="togglePassword"></i>
                    </div>

                    <small class="error" id="passwordError"></small>
                </div>

                <!-- Confirm Password -->
                <div class="input-group">
                    <label>Confirm Password</label>

                    <div class="password-box">
                        <input type="password" id="confirmPassword" placeholder="Confirm password">

                        <i class="fa-solid fa-eye togglePassword" id="toggleConfirmPassword"></i>
                    </div>

                    <small class="error" id="confirmPasswordError"></small>
                </div>

                <button type="submit" class="btn">
                    Sign Up
                </button>

            </form>

            <p class="link-text">
                Already have an account?
                <a href="index.html">Sign In</a>
            </p>

        </div>

    </div>

    <script src="js/signUp.js"></script>

</body>

</html>
